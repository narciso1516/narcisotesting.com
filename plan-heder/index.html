<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#1769d2"><title>Tablero | Heder Omar Rodríguez Vázquez</title><style>
:root{--p:#1769d2;--p2:#0b4ea2;--a:#ffd43b;--g:#38a93f;--ink:#18324a;--line:#bddcf0}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(#8ad4ff 0 240px,#dff5ff 240px);color:var(--ink)}.w{width:min(1120px,calc(100% - 22px));margin:auto}header{padding:28px 0}.hero{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:5px solid #fff;border-radius:28px;padding:27px;box-shadow:0 12px 0 #0b3f7a;display:grid;grid-template-columns:1fr auto;gap:18px}.badge{display:inline-block;background:var(--a);color:#3b2f00;padding:7px 12px;border-radius:99px;font-weight:900}h1{font-size:clamp(2.1rem,6vw,4rem);margin:12px 0 6px}.count{width:135px;height:135px;border-radius:50%;background:var(--a);border:6px solid #fff;color:var(--p2);display:grid;place-items:center;font-size:1.35rem;font-weight:1000}.card,.week{background:#fff;border:4px solid #fff;border-radius:22px;padding:19px;margin:17px 0;box-shadow:0 8px 0 #1769d238,0 15px 34px #1769d224}h2,h3,h4{color:var(--p2)}.weeks{display:grid;gap:17px}.wh{display:flex;gap:11px;align-items:center}.n{width:43px;height:43px;border-radius:50%;background:var(--a);display:grid;place-items:center;font-weight:1000}.lessons{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:13px}.lesson{border:2px solid var(--line);border-radius:15px;padding:14px;background:#f7fcff;display:flex;flex-direction:column}.lab{font-size:.75rem;font-weight:900;color:var(--p)}.lesson p{color:#60758b;font-size:.84rem;min-height:62px;flex:1}.open,.soon,.done{display:block;text-align:center;border-radius:11px;padding:10px;font-weight:900;margin-top:7px}.open{background:var(--p);color:#fff;text-decoration:none;box-shadow:0 4px 0 var(--p2)}.soon{background:#e8eef5;color:#60758b}.done{border:2px solid #fff;background:var(--g);color:#fff;cursor:pointer;box-shadow:0 4px 0 #207a2b}.done.on{background:#60758b;box-shadow:0 4px 0 #354657}.product{margin-top:11px;background:#fff8d8;border:2px solid var(--a);border-radius:13px;padding:11px}details{margin-top:11px;border-top:1px dashed var(--line);padding-top:8px}summary{font-weight:900;color:var(--p2)}.support{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.support div{background:#eef8ff;border-radius:12px;padding:10px}@media(max-width:790px){.hero{grid-template-columns:1fr}.lessons,.support{grid-template-columns:1fr}.count{width:115px;height:115px}}
</style></head><body><header><div class="w"><section class="hero"><div><span class="badge">⚡ RUTA DE VELOCIDAD</span><h1>Heder Omar Rodríguez Vázquez</h1><p>Curso de verano de inglés · 6 semanas · 18 clases</p></div><div class="count"><span id="prog">0/18</span></div></section></div></header><main class="w"><section class="card"><h2>Ruta de clases</h2><p>Las clases disponibles muestran el botón <b>Abrir clase</b>. Después de trabajarla, marca la sesión como realizada.</p></section><div id="weeks" class="weeks"></div></main><script>
const path="plan-heder",K="heder-dashboard-v6",data=[
["Semana 1: Presente continuo y práctica contextual",[["Clase 1","Present Continuous: situaciones reales","Vocabulario académico, lectura, escritura, producción oral y reto final.",1],["Clase 2","Afirmaciones y vocabulario","am/is/are, verbos en -ing y vida escolar.",0],["Clase 3","Negaciones y preguntas","Transformación, errores y conversación.",0]],"Producto: What is happening in my life this week?"],
["Semana 2: Was, were, there was y there were",[["Clase 4","Was/were","Experiencias personales.",0],["Clase 5","Preguntas y negaciones","Entrevista y respuestas.",0],["Clase 6","There was/were","Lugares antes y ahora.",0]],""],
["Semana 3: Pasado simple",[["Clase 7","Verbos regulares","Pronunciación -ed.",0],["Clase 8","Verbos irregulares","Vocabulario en contexto.",0],["Clase 9","Did/didn't","Preguntas y narración.",0]],""],
["Semana 4: Conectores y recomendaciones",[["Clase 10","Secuencia","First, then, next, finally.",0],["Clase 11","Should/shouldn't","Consejos y situaciones.",0],["Clase 12","Integración","Lectura, escritura y conversación.",0]],""],
["Semana 5: Comparativos y superlativos",[["Clase 13","Igualdad","as…as.",0],["Clase 14","Comparativos","-er, more y less.",0],["Clase 15","Superlativos","Rankings y presentación.",0]],""],
["Semana 6: Futuro y proyecto final",[["Clase 16","Going to","Planes personales.",0],["Clase 17","Will","Predicciones.",0],["Clase 18","Proyecto final","Yesterday, today and tomorrow.",0]],""]
];
weeks.innerHTML=data.map((w,i)=>`<section class="week"><div class="wh"><div class="n">${i+1}</div><div><h3>${w[0]}</h3><p>3 sesiones · práctica guiada y aplicada</p></div></div><div class="lessons">${w[1].map(c=>`<article class="lesson"><span class="lab">${c[0]}${c[3]?' · DISPONIBLE':''}</span><h4>${c[1]}</h4><p>${c[2]}</p>${c[3]?`<a class="open" href="https://narciso1516.github.io/narcisotesting.com/${path}/clases/presente-continuo/">Abrir ${c[0]}</a>`:'<span class="soon">Próximamente</span>'}<button class="done" onclick="toggleDone(this)">Marcar realizada</button></article>`).join('')}</div>${w[2]?`<div class="product">${w[2]}</div>`:''}<details ${i===0?'open':''}><summary>Apoyo del profesor</summary><div class="support"><div><b>Antes</b><br>Preparar libreta y ejemplos.</div><div><b>Durante</b><br>Modelar y corregir.</div><div><b>Después</b><br>Guardar evidencia.</div></div></details></section>`).join('');
function toggleDone(b){b.classList.toggle('on');b.textContent=b.classList.contains('on')?'Realizada ✓':'Marcar realizada';save()}function save(){const a=[...document.querySelectorAll('.done')].map(x=>x.classList.contains('on'));localStorage.setItem(K,JSON.stringify(a));prog.textContent=a.filter(Boolean).length+'/18'}const a=JSON.parse(localStorage.getItem(K)||'[]');document.querySelectorAll('.done').forEach((b,i)=>{if(a[i]){b.classList.add('on');b.textContent='Realizada ✓'}});prog.textContent=a.filter(Boolean).length+'/18';
</script></body></html>
